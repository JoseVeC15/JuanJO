<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563EB">
    <title>SaaS Financiero Audiovisual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }
        .status {
            display: inline-block;
            padding: 10px 20px;
            background: #22c55e;
            border-radius: 30px;
            font-weight: bold;
        }
        .features {
            text-align: left;
            margin-top: 30px;
        }
        .features li {
            list-style: none;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .features li::before {
            content: "✓ ";
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 SaaS Audiovisual</h1>
        <p>Sistema de Gestión Financiera para Freelancers</p>
        <div class="status">Sistema Operativo</div>
        
        <ul class="features">
            <li>Gestión de Proyectos</li>
            <li>OCR de Facturas con OpenAI</li>
            <li>Inventario de Equipo</li>
            <li>Alertas Telegram</li>
            <li>Reportes Financieros</li>
        </ul>
    </div>
    
    <script>
        // Auto-redirect to Flutter app when available
        const flutterAppUrl = window.location.origin;
        setTimeout(() => {
            console.log('Flutter app would load here');
        }, 1000);
    </script>
</body>
</html>
